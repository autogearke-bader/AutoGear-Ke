<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 300 533" width="300" height="533">
  <!-- Dark background card -->
  <rect width="300" height="533" fill="#1e293b" rx="12"/>
  
  <!-- TikTok PNG Image - Using assets path from web root -->
  <image 
    xlink:href="/assets/tiktok.png"
    href="/assets/tiktok.png"
    x="25" 
    y="80" 
    width="250" 
    height="320"
    preserveAspectRatio="xMidYMid meet"
  />
  
  <!-- Fallback: TikTok-style icon if image fails to load -->
  <g id="fallback-icon" transform="translate(150, 240)">
    <path fill="#fe2c55" d="M98.5 47.5c-3.5-12.8-14.2-22-27.5-22.5-18.8-.7-35.6 13.3-39.2 32.5-3.8 20.3 5.2 41.3 22 50.8 14.5 8.2 31.8 6.5 44.7-4 8.3-6.7 13.8-16.8 14.2-27.7.3-8.5-2.3-16.7-7-23.5-1.2-1.7-2.6-3.2-4.2-4.6z" transform="scale(1.4) translate(-50, -50)"/>
    <path fill="#25f4ee" d="M95.5 43.5c-3-11-12.2-18.8-23.5-19.2-16.1-.6-30.5 11.4-33.6 27.9-3.3 17.4 4.5 35.4 18.8 43.5 12.4 7 27.2 5.6 38.3-3.4 7.1-5.7 11.8-14.4 12.2-23.7.2-7.3-2-14.3-6-20.2-1-1.5-2.2-2.8-3.6-4z" transform="scale(1.4) translate(-50, -50)"/>
  </g>
  
  <!-- "TikTok" text at bottom -->
  <text x="150" y="460" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24" font-weight="bold">TikTok</text>
</svg>