# wrangler.toml — place this in the same folder as sitemap-worker.js
# Deploy with: npx wrangler deploy

name       = "mekh-sitemap"
main       = "sitemap-worker.js"
compatibility_date = "2024-01-01"

account_id = "b7b8c5e1b497ba05c49f9126e422d93e"

# Route the Worker to /sitemap.xml on your domain.
# Replace the zone_name if yours differs.
routes = [
  { pattern = "mekh.app/sitemap.xml", zone_name = "mekh.app" }
]
 
[vars]
SUPABASE_URL = "https://tecdmgiufjlxhrihbuik.supabase.co"

# Environment variables are set via the Cloudflare dashboard
# (Workers > mekh-sitemap > Settings > Variables)
# Do NOT put secret keys in this file.
